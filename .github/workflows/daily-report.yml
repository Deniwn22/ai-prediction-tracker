name: Daily AI Prediction Report

on:
  schedule:
    - cron: '0 9 * * *'   # основной — 09:00 UTC
    - cron: '0 10 * * *'  # резервный — 10:00 UTC
  workflow_dispatch:        # запуск вручную

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run bot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TALENT_WALLET: ${{ secrets.TALENT_WALLET }}
        run: node bot.js

      - name: Commit and push report
        run: |
          git config user.name "Deniwn22"
          git config user.email "Deniwn22@users.noreply.github.com"
          git pull origin main --rebase
          git add reports/
          git diff --staged --quiet || git commit -m "📊 Daily AI report $(date +%Y-%m-%d)"
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/Deniwn22/ai-prediction-tracker.git main
